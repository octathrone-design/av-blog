<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="896" viewBox="0 0 1200 896">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C48A4D"/>
      <stop offset="50%" style="stop-color:#e8b87e"/>
      <stop offset="100%" style="stop-color:#C48A4D"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b87e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C48A4D;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="896" fill="url(#bg1)"/>
  <!-- City skyline -->
  <g opacity="0.15">
    <rect x="0" y="500" width="1200" height="396" fill="#0a0a23"/>
    <rect x="50" y="420" width="40" height="476" fill="#1a1a3e"/>
    <rect x="120" y="350" width="30" height="546" fill="#1a1a3e"/>
    <rect x="180" y="380" width="50" height="516" fill="#1a1a3e"/>
    <rect x="260" y="300" width="35" height="596" fill="#1a1a3e"/>
    <rect x="330" y="440" width="45" height="456" fill="#1a1a3e"/>
    <rect x="400" y="360" width="50" height="536" fill="#1a1a3e"/>
    <rect x="480" y="280" width="40" height="616" fill="#1a1a3e"/>
    <rect x="550" y="400" width="50" height="496" fill="#1a1a3e"/>
    <rect x="630" y="340" width="30" height="556" fill="#1a1a3e"/>
    <rect x="690" y="420" width="45" height="476" fill="#1a1a3e"/>
    <rect x="760" y="310" width="40" height="586" fill="#1a1a3e"/>
    <rect x="830" y="370" width="55" height="526" fill="#1a1a3e"/>
    <rect x="910" y="290" width="35" height="606" fill="#1a1a3e"/>
    <rect x="980" y="410" width="40" height="486" fill="#1a1a3e"/>
    <rect x="1050" y="350" width="50" height="546" fill="#1a1a3e"/>
    <rect x="1130" y="390" width="30" height="506" fill="#1a1a3e"/>
  </g>
  <!-- Sun glow -->
  <circle cx="800" cy="350" r="180" fill="url(#sun)"/>
  <!-- Floor line -->
  <rect x="0" y="640" width="1200" height="4" fill="url(#gld)" opacity="0.4"/>
  <!-- Column -->
  <rect x="100" y="400" width="20" height="240" fill="#C48A4D" opacity="0.3"/>
  <rect x="1080" y="400" width="20" height="240" fill="#C48A4D" opacity="0.3"/>
  <!-- Floor reflection -->
  <rect x="0" y="644" width="1200" height="252" fill="url(#bg1)" opacity="0.5"/>
  <!-- Design elements - floating geometric shapes -->
  <circle cx="300" cy="500" r="80" fill="none" stroke="#C48A4D" stroke-width="1" opacity="0.2"/>
  <circle cx="300" cy="500" r="50" fill="none" stroke="#e8b87e" stroke-width="0.5" opacity="0.3"/>
  <rect x="550" y="480" width="120" height="120" fill="none" stroke="#C48A4D" stroke-width="1" opacity="0.15" transform="rotate(15 610 540)"/>
  <circle cx="900" cy="520" r="60" fill="none" stroke="#C48A4D" stroke-width="1" opacity="0.2"/>
  <!-- Light rays -->
  <g opacity="0.08">
    <line x1="800" y1="250" x2="200" y2="640" stroke="#e8b87e" stroke-width="2"/>
    <line x1="800" y1="250" x2="500" y2="640" stroke="#e8b87e" stroke-width="2"/>
    <line x1="800" y1="250" x2="800" y2="640" stroke="#e8b87e" stroke-width="2"/>
    <line x1="800" y1="250" x2="1100" y2="640" stroke="#e8b87e" stroke-width="2"/>
    <line x1="800" y1="250" x2="1000" y2="640" stroke="#e8b87e" stroke-width="1.5"/>
  </g>
  <!-- Decorative bottom line -->
  <line x1="200" y1="820" x2="1000" y2="820" stroke="#C48A4D" stroke-width="0.5" opacity="0.4"/>
  <text x="600" y="845" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C48A4D" opacity="0.5" letter-spacing="8">AV DESIGN INTERNATIONAL</text>
</svg>
