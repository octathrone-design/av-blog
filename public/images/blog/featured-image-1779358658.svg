<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="896" viewBox="0 0 1200 896">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b3d"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="gld2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a67c52"/>
      <stop offset="50%" style="stop-color:#d4a96a"/>
      <stop offset="100%" style="stop-color:#a67c52"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a96a;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#d4a96a;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="896" fill="url(#bg2)"/>
  <!-- Warm atmosphere -->
  <rect x="0" y="0" width="1200" height="896" fill="url(#warm)"/>
  <!-- Archway element -->
  <path d="M 300 300 Q 600 100 900 300 L 900 896 L 300 896 Z" fill="#2d1b3d" opacity="0.3"/>
  <!-- Arch outline -->
  <path d="M 350 350 Q 600 180 850 350" fill="none" stroke="#d4a96a" stroke-width="2" opacity="0.3"/>
  <!-- Interior wall -->
  <rect x="0" y="500" width="1200" height="396" fill="#1a1a2e" opacity="0.8"/>
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="196" fill="#0f0f1a"/>
  <!-- Floor line -->
  <line x1="0" y1="700" x2="1200" y2="700" stroke="#d4a96a" stroke-width="1.5" opacity="0.4"/>
  <!-- Decorative panel -->
  <rect x="400" y="350" width="400" height="350" fill="none" stroke="#d4a96a" stroke-width="1" opacity="0.15"/>
  <rect x="420" y="370" width="360" height="310" fill="none" stroke="#d4a96a" stroke-width="0.5" opacity="0.1"/>
  <!-- Abstract branches -->
  <g opacity="0.12" stroke="#d4a96a" stroke-width="1.5" fill="none">
    <path d="M 200 600 Q 250 500 300 480 Q 320 470 340 490"/>
    <path d="M 220 590 Q 260 520 280 510"/>
    <path d="M 300 480 Q 340 440 380 435 Q 400 432 420 440"/>
    <path d="M 850 550 Q 900 480 950 460 Q 970 450 1000 470"/>
    <path d="M 870 540 Q 920 500 940 490"/>
  </g>
  <!-- Geometric decorative elements -->
  <g opacity="0.2">
    <rect x="150" y="300" width="60" height="60" fill="none" stroke="#d4a96a" stroke-width="1" transform="rotate(45 180 330)"/>
    <rect x="990" y="320" width="50" height="50" fill="none" stroke="#d4a96a" stroke-width="1" transform="rotate(30 1015 345)"/>
  </g>
  <!-- Light fixture suggestion -->
  <g opacity="0.15">
    <line x1="600" y1="0" x2="600" y2="200" stroke="#d4a96a" stroke-width="1"/>
    <line x1="550" y1="200" x2="650" y2="200" stroke="#d4a96a" stroke-width="1"/>
    <line x1="530" y1="220" x2="670" y2="220" stroke="#d4a96a" stroke-width="0.5"/>
    <circle cx="600" cy="240" r="5" fill="#d4a96a" opacity="0.3"/>
  </g>
  <!-- Ambient dots -->
  <g fill="#d4a96a" opacity="0.08">
    <circle cx="100" cy="200" r="2"/>
    <circle cx="250" cy="150" r="1.5"/>
    <circle cx="400" cy="180" r="1"/>
    <circle cx="700" cy="120" r="1.5"/>
    <circle cx="850" cy="160" r="2"/>
    <circle cx="1050" cy="190" r="1"/>
    <circle cx="1100" cy="250" r="1.5"/>
    <circle cx="150" cy="300" r="1"/>
    <circle cx="350" cy="250" r="1.5"/>
    <circle cx="950" cy="220" r="1"/>
  </g>
  <!-- Bottom text -->
  <line x1="300" y1="830" x2="900" y2="830" stroke="#d4a96a" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="858" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#d4a96a" opacity="0.4" letter-spacing="10">LUXURY RESIDENTIAL DESIGN</text>
</svg>
